<section class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="rounded-3 p-4 p-md-5 border bg-white">
      <h1 class="h3 mb-4">Login</h1>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="login-email" class="form-label">Email</label>
          <input id="login-email" name="email" type="email" class="form-control" required />
        </div>

        <div class="mb-3">
          <label for="login-password" class="form-label">Password</label>
          <input id="login-password" name="password" type="password" class="form-control" required />
        </div>

        <div id="login-status" class="small mb-3" aria-live="polite"></div>

        <button id="login-submit" type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>

      <p class="mt-3 mb-0">
        No account yet?
        <a href="#/register">Create one</a>
      </p>
    </div>
  </div>
</section>
